<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="page-login">
  <div class="device device--login" id="device">
    <header class="login-top">
      <a class="login-back" href="connexion.html" aria-label="Retour">
        <span class="login-back__icon" aria-hidden="true">←</span>
        <span class="login-back__text">Retour</span>
      </a>
    </header>

    <main class="login" aria-label="Inscription">
      <div class="login-center">
        <div class="login-head">
          <h1 class="login-title">Inscription</h1>
          <p class="login-subtitle">Créez votre compte Swype</p>
        </div>

        <form class="register-form" action="accueil.html">
          <div class="signup-row">
            <label class="field">
              <span class="field-label">Prénom</span>
              <input class="field-input" type="text" name="firstName" autocomplete="given-name" value="Lina"
                required />
            </label>

            <label class="field">
              <span class="field-label">Nom</span>
              <input class="field-input" type="text" name="lastName" autocomplete="family-name" value = "Sans-nom"
                required />
            </label>
          </div>

          <label class="field">
            <span class="field-label">Email</span>
            <input class="field-input" type="email" name="email" placeholder="Entrez un email" autocomplete="email"
              required />
          </label>

          <label class="field">
            <span class="field-label">Numéro de téléphone</span>
            <input class="field-input" type="tel" name="phone" placeholder="06 00 00 00 00" autocomplete="tel"
              required />
          </label>

          <label class="field">
            <span class="field-label">Mot de passe</span>
            <input class="field-input" type="password" name="password" placeholder="minimum 8 caractères"
              autocomplete="new-password" required />
          </label>

          <label class="field">
            <span class="field-label">Confirmer le mot de passe</span>
            <input class="field-input" type="password" name="confirmPassword" placeholder=""
              autocomplete="new-password" required />
          </label>

          <button class="login-submit" type="submit">Créer mon compte</button>
        </form>

        <p class="login-foot">
          Déjà un compte ?
          <a class="login-signup" href="connexion.html">Se connecter</a>
        </p>
      </div>
    </main>
  </div>
</body>

</html>
