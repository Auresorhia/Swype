<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accueil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="page-home">
  <div class="home-shell" id="home">
    <header class="home-top" aria-label="En-tête">
      <a class="home-back" id="homeBack" href="index.html" aria-label="Retour">
        <span class="home-back__arrow" aria-hidden="true">←</span>
        <span class="home-back__label">Retour</span>
      </a>
      <img class="home-logo" src="asset/logo/logo-swype.webp" alt="SWype" />

      <div class="home-nav" aria-label="Navigation">
        <a class="home-link" href="styles.html">Nos styles <span class="home-link__arrow"
            aria-hidden="true">→</span></a>
        <a class="home-link home-link--details" href="#">Voir les détails <span class="home-link__info"
            aria-hidden="true">ⓘ</span></a>
      </div>
    </header>

    <main class="home" aria-label="Accueil">
      <section class="home-stage" aria-label="Produit">
        <div class="home-card" id="swipeCard" role="group" aria-label="Carte produit">
          <div class="home-card__overlay home-card__overlay--no" aria-hidden="true">✕</div>
          <div class="home-card__overlay home-card__overlay--yes" aria-hidden="true">♥</div>
          <div class="home-card__media" aria-hidden="true"></div>
        </div>
      </section>

      <div class="details-modal" id="detailsModal" aria-hidden="true">
        <div class="details-backdrop" data-details-close></div>
        <div class="details-sheet" role="dialog" aria-modal="true" aria-label="Détails article">
          <div class="details-media" id="detailsMedia" aria-hidden="true"></div>
          <button class="details-close" type="button" aria-label="Fermer" data-details-close>✕</button>
          <div class="details-content" id="detailsContent"></div>
        </div>
      </div>

      <section class="home-end" id="homeEnd" aria-label="Fin de sélection" hidden>
        <h1 class="home-end__title">Sélection Terminée</h1>
        <p class="home-end__subtitle">Allez voir votre sélection du jour</p>
        <a class="home-end__cta" href="favoris.html">Mes Favoris</a>
      </section>

      <section class="home-bottom" aria-label="Actions">
        <div class="home-bottom__fade" aria-hidden="true"></div>

        <div class="home-product" aria-label="Informations produit">
          <div class="home-product__title" id="productTitle">SAC Y2K À CHAINES</div>
          <div class="home-product__meta" id="productMeta">Couleur : Noir/Rose</div>
          <div class="home-product__price" id="productPrice">14,99€</div>
        </div>

        <div class="home-actions" aria-label="Boutons">
          <button class="home-action home-action--no" id="btnNo" type="button" aria-label="Refuser">×</button>
          <button class="home-action home-action--fav" id="btnYes" type="button" aria-label="Favori">♥</button>
        </div>

        <div class="home-dots" id="homeDots" aria-label="Pagination">
          <span class="home-dot home-dot--active"></span>
          <span class="home-dot"></span>
          <span class="home-dot"></span>
          <span class="home-dot"></span>
          <span class="home-dot"></span>
        </div>
      </section>
    </main>
  </div>

  <script src="accueil.js"></script>
</body>

</html>
